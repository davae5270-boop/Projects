<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - DavaOFC</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #06070d;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Ambient Cyber Glow Background */
        body::before {
            content: '';
            position: absolute;
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, rgba(124, 77, 255, 0.2) 0%, transparent 70%);
            top: 15%;
            left: 10%;
            z-index: 0;
            pointer-events: none;
        }
        body::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(0, 230, 118, 0.08) 0%, transparent 70%);
            bottom: 10%;
            right: 5%;
            z-index: 0;
            pointer-events: none;
        }

        /* Cyberpunk Grid Mesh Overlay */
        .bg-grid {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(255,255,255,0.01) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255,255,255,0.01) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: 0;
            pointer-events: none;
        }

        /* Main Container Box Ultra HD */
        .login-box {
            background: rgba(20, 22, 29, 0.75);
            backdrop-filter: blur(24px) saturate(120%);
            -webkit-backdrop-filter: blur(24px) saturate(120%);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 24px;
            padding: 44px 36px;
            width: 440px;
            max-width: 92%;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            z-index: 10;
            position: relative;
            max-height: 94vh;
            overflow-y: auto;
        }
        .login-box::-webkit-scrollbar { width: 4px; }
        .login-box::-webkit-scrollbar-thumb { background: #7c4dff; border-radius: 10px; }

        /* Premium Text Gradient Logo */
        .login-box .logo { text-align: center; margin-bottom: 32px; }
        .login-box .logo h1 {
            font-size: 34px;
            font-weight: 900;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #ffffff 30%, #a382ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
        }
        .login-box .logo p {
            color: #8a8d93;
            font-size: 13.5px;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        /* Form Group & Input Styling */
        .form-group { margin-bottom: 18px; text-align: left; }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 8px;
            letter-spacing: 0.3px;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: #0b0c10; /* Flat Dark Solid */
            border: 1px solid rgba(255, 255, 255, 0.09);
            border-radius: 12px;
            color: #ffffff;
            font-size: 14.5px;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: 'Inter', sans-serif;
            outline: none;
        }
        .form-group input:focus {
            border-color: #7c4dff;
            background: #0e1016;
            box-shadow: 0 0 0 3px rgba(124, 77, 255, 0.2);
        }
        .form-group input::placeholder { color: #4e5156; }
        
        /* Premium Buttons */
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 14.5px;
            cursor: pointer;
            transition: all 0.25s ease;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            letter-spacing: 0.3px;
        }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }
        
        .btn-login {
            background: linear-gradient(135deg, #7c4dff 0%, #5333ed 100%);
            color: #ffffff;
            box-shadow: 0 4px 16px rgba(83, 51, 237, 0.35);
        }
        .btn-login:hover {
            transform: translateY(-1.5px);
            box-shadow: 0 8px 24px rgba(83, 51, 237, 0.5);
        }

        .btn-register {
            background: linear-gradient(135deg, #00e676 0%, #00b0ff 100%);
            color: #06070d;
            box-shadow: 0 4px 16px rgba(0, 230, 118, 0.2);
        }
        .btn-register:hover {
            transform: translateY(-1.5px);
            box-shadow: 0 8px 24px rgba(0, 230, 118, 0.35);
        }

        .btn-cancel {
            background: rgba(255, 255, 255, 0.04);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .btn-cancel:hover { background: rgba(255, 255, 255, 0.08); }

        /* Modern UI Dividers */
        .divider {
            display: flex;
            align-items: center;
            margin: 22px 0;
            color: #4e5156;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }
        .divider::before { margin-right: 14px; }
        .divider::after { margin-left: 14px; }

        /* Smooth Slidin Animation Register Form */
        #registerForm {
            display: none;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            animation: formFadeIn 0.35s ease-out;
        }
        @keyframes formFadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn-group { display: flex; gap: 12px; margin-top: 6px; }
        .btn-group .btn { flex: 1; }

        /* Custom Alerts & Toasts Info */
        .alert {
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 13.5px;
            margin-bottom: 18px;
            text-align: left;
            font-weight: 500;
        }
        .alert-error {
            background: rgba(255, 23, 68, 0.08);
            border: 1px solid rgba(255, 23, 68, 0.2);
            color: #ff1744;
        }
        .alert-success {
            background: rgba(0, 230, 118, 0.08);
            border: 1px solid rgba(0, 230, 118, 0.2);
            color: #00e676;
        }

        .footer { text-align: center; margin-top: 24px; color: #6c757d; font-size: 12.5px; }
        .footer a { color: #a382ff; text-decoration: none; font-weight: 700; }
        .footer a:hover { text-decoration: underline; }

        /* Toast Container */
        .toast-container { position: fixed; top: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 12px; }
        .toast {
            padding: 16px 20px;
            border-radius: 14px;
            background: rgba(14, 16, 22, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 12px 40px rgba(0,0,0,0.6);
            color: #ffffff;
            font-size: 14px;
            font-weight: 500;
            min-width: 300px;
            animation: slideIn 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .toast.success { border-left: 4px solid #00e676; }
        .toast.error { border-left: 4px solid #ff1744; }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.2);
            border-top: 2px solid currentColor;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 480px) {
            .login-box { padding: 32px 24px; }
            .login-box .logo h1 { font-size: 28px; }
            .btn-group { flex-direction: column; gap: 8px; }
            .toast { min-width: auto; width: calc(100vw - 48px); }
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>

    <div class="login-box">
        <div class="logo">
            <h1>🚀 DavaOFC</h1>
            <p>Crypto Exchange & Slot Games</p>
        </div>
        
        <!-- Target Alert Render -->
        <div id="alertContainer"></div>
        
        <!-- LOGIN FORM FRAMEWORK -->
        <form id="loginForm">
            <div class="form-group">
                <label><i class="fas fa-user-shield" style="color: #7c4dff; margin-right: 4px;"></i> Telegram ID</label>
                <input type="text" id="loginId" placeholder="Masukkan ID Telegram Anda" required>
                <small style="color: #6c757d; display: block; margin-top: 6px; font-size: 11.5px; line-height: 1.4;">
                    💡 Dapatkan nomor ID dari bot resmi <b>@userinfobot</b> di aplikasi Telegram.
                </small>
            </div>
            <button type="submit" class="btn btn-login" id="loginBtn">
                <i class="fas fa-sign-in-alt"></i> Masuk Sekarang
            </button>
        </form>
        
        <div class="divider">Atau Gabung Mitra</div>
        
        <!-- SHOW REGISTER BUTTON -->
        <button class="btn btn-register" id="mainRegBtn" onclick="showRegister()">
            <i class="fas fa-user-plus"></i> Buat Akun Baru
        </button>
        
        <!-- REGISTRATION SUB-FORM (HIDDEN BY DEFAULT) -->
        <div id="registerForm">
            <div class="form-group">
                <label><i class="fas fa-id-card" style="color: #00e676; margin-right: 4px;"></i> Telegram ID</label>
                <input type="text" id="regId" placeholder="Contoh: 87373668" required>
            </div>
            <div class="form-group">
                <label><i class="fas fa-at" style="color: #00e676; margin-right: 4px;"></i> Username Telegram</label>
                <input type="text" id="regUsername" placeholder="Username tanpa tanda @ (Contoh: davaputra)" required>
            </div>
            <div class="form-group">
                <label><i class="fas fa-user" style="color: #00e676; margin-right: 4px;"></i> Nama Lengkap</label>
                <input type="text" id="regName" placeholder="Masukkan nama sesuai rekening penampung" required>
            </div>
            <div class="btn-group">
                <button class="btn btn-register" onclick="registerUser()" id="registerBtn" style="color: #ffffff; background: linear-gradient(135deg, #00c853 0%, #009624 100%);">
                    <i class="fas fa-check"></i> Konfirmasi Daftar
                </button>
                <button class="btn btn-cancel" onclick="hideRegister()">
                    <i class="fas fa-times"></i> Batalkan
                </button>
            </div>
        </div>
        
        <div class="footer">
            <p>💡 Mengalami kendala? CS Support: <a href="https://t.me/davaofc4" target="_blank">@davaofc4</a></p>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        // Real-time dynamic native Toast implementation
        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = message;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100%)';
                setTimeout(() => toast.remove(), 400);
            }, 4500);
        }

        function showAlert(message, type = 'error') {
            const container = document.getElementById('alertContainer');
            container.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
            setTimeout(() => { container.innerHTML = ''; }, 7000);
        }

        function showRegister() {
            document.getElementById('mainRegBtn').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
            document.getElementById('registerForm').scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function hideRegister() {
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('mainRegBtn').style.display = 'flex';
            document.getElementById('regId').value = '';
            document.getElementById('regUsername').value = '';
            document.getElementById('regName').value = '';
            document.getElementById('alertContainer').innerHTML = '';
        }

        // Asynchronous user sign up controller via Fetch API
        async function registerUser() {
            const telegram_id = document.getElementById('regId').value.trim();
            const username = document.getElementById('regUsername').value.trim();
            const full_name = document.getElementById('regName').value.trim();

            if (!telegram_id || !username || !full_name) {
                showToast('⚠️ Silakan lengkapi seluruh field pendaftaran!', 'error');
                return;
            }

            if (!/^\d+$/.test(telegram_id)) {
                showToast('⚠️ Karakter Telegram ID wajib berupa nominal angka!', 'error');
                return;
            }

            const btn = document.getElementById('registerBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Sinkronisasi...';

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ telegram_id, username, full_name })
                });

                const data = await response.json();

                if (data.success) {
                    showToast('✅ Pendaftaran berhasil! Membuka gerbang masuk...', 'success');
                    showAlert('✅ ' + data.message, 'success');
                    document.getElementById('loginId').value = telegram_id;
                    hideRegister();
                    setTimeout(() => {
                        document.getElementById('loginForm').dispatchEvent(new Event('submit'));
                    }, 1200);
                } else {
                    showToast('❌ ' + data.error, 'error');
                    showAlert('❌ ' + data.error, 'error');
                }
            } catch (error) {
                showToast('❌ Gangguan transmisi data: ' + error.message, 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-check"></i> Konfirmasi Daftar';
            }
        }

        // Session validation authentication script
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const telegram_id = document.getElementById('loginId').value.trim();
            if (!telegram_id) {
                showToast('⚠️ Kolom Telegram ID tidak boleh kosong!', 'error');
                return;
            }

            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Autentikasi...';

            try {
                const formData = new FormData();
                formData.append('telegram_id', telegram_id);

                const response = await fetch('/login', {
                    method: 'POST',
                    body: formData
                });

                if (response.redirected) {
                    window.location.href = response.url;
                } else {
                    const text = await response.text();
                    if (text.includes('User tidak ditemukan')) {
                        showToast('❌ ID Belum Terdaftar! Dialihkan ke menu registrasi.', 'error');
                        showAlert('❌ Data ID tidak terdaftar di sistem. Mohon buat akun baru dahulu.', 'error');
                        showRegister();
                    } else {
                        location.reload();
                    }
                }
            } catch (error) {
                showToast('❌ Gagal menghubungi server: ' + error.message, 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Masuk Sekarang';
            }
        });

        // Key interception event listener
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const regForm = document.getElementById('registerForm');
                if (regForm.style.display === 'block') {
                    e.preventDefault();
                    registerUser();
                }
            }
        });
    </script>
</body>
</html>
