<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login Hub - DavaOFC Platform</title>
    
    <!-- Fonts & Core Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* CSS Reset & Core Layer */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #05060b;
            color: #ffffff;
            position: relative;
            overflow: hidden;
        }

        /* Interactive Backdrop Canvas Background */
        #particleCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* Luxury Subtle Radial Light Layers */
        .glow-sphere-1 {
            position: absolute;
            width: 550px;
            height: 550px;
            background: radial-gradient(circle, rgba(124, 77, 255, 0.12) 0%, transparent 75%);
            top: -10%;
            left: -5%;
            z-index: 2;
            pointer-events: none;
        }

        .glow-sphere-2 {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(0, 230, 118, 0.04) 0%, transparent 75%);
            bottom: -15%;
            right: -5%;
            z-index: 2;
            pointer-events: none;
        }

        /* Structural Container Matrix */
        .auth-wrapper {
            width: 100%;
            max-width: 450px;
            padding: 24px;
            z-index: 10;
            position: relative;
        }

        /* Glassmorphism Card Core Frame */
        .auth-card {
            background: rgba(13, 15, 22, 0.80);
            backdrop-filter: blur(24px) saturate(130%);
            -webkit-backdrop-filter: blur(24px) saturate(130%);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 28px;
            padding: 52px 44px;
            box-shadow: 0 25px 55px rgba(0, 0, 0, 0.75),
                        inset 0 1px 1px rgba(255, 255, 255, 0.05);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Logo Branding & Headers */
        .auth-header {
            text-align: center;
            margin-bottom: 38px;
        }

        .auth-header h1 {
            font-size: 36px;
            font-weight: 900;
            letter-spacing: -0.75px;
            background: linear-gradient(135deg, #ffffff 30%, #a382ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .auth-header p {
            color: #7e828a;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.2px;
        }

        /* Form Layout & Fields Engine */
        .form-group {
            margin-bottom: 22px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 12.5px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.85);
            margin-bottom: 8px;
            letter-spacing: 0.2px;
        }

        .input-box-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-box-wrapper .field-icon {
            position: absolute;
            left: 18px;
            color: #4a4d54;
            font-size: 15px;
            transition: color 0.25s ease;
            pointer-events: none;
            z-index: 5;
        }

        .input-box-wrapper input {
            width: 100%;
            padding: 15px 48px 15px 48px;
            background: #08090d;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            color: #ffffff;
            font-size: 14.5px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input-box-wrapper input:focus {
            border-color: #7c4dff;
            background: #0c0d14;
            box-shadow: 0 0 0 3px rgba(124, 77, 255, 0.18);
        }

        /* Input Interaction States */
        .input-box-wrapper input:focus ~ .field-icon {
            color: #7c4dff;
        }

        .input-box-wrapper input::placeholder {
            color: #3e4147;
        }

        /* Interactive Eye Icon for Password Triggers */
        .password-toggle-trigger {
            position: absolute;
            right: 18px;
            color: #4a4d54;
            font-size: 15px;
            cursor: pointer;
            padding: 4px;
            z-index: 5;
            transition: color 0.2s ease;
        }
        
        .password-toggle-trigger:hover {
            color: #8b6be8;
        }

        /* High-Definition Solid Button System */
        .btn-core-submit {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            font-weight: 700;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: linear-gradient(135deg, #7c4dff 0%, #5333ed 100%);
            color: #ffffff;
            box-shadow: 0 6px 20px rgba(83, 51, 237, 0.3);
            transition: all 0.25s ease;
        }

        .btn-core-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 28px rgba(83, 51, 237, 0.45);
        }

        .btn-core-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }

        /* Native Notification & Error Banner */
        .error-banner-frame {
            padding: 14px 16px;
            border-radius: 14px;
            font-size: 13.5px;
            margin-bottom: 22px;
            text-align: left;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 23, 68, 0.08);
            border: 1px solid rgba(255, 23, 68, 0.2);
            color: #ff1744;
            animation: cardHurtGlitch 0.35s ease-in-out;
        }

        @keyframes cardHurtGlitch {
            0% { transform: translateY(-4px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        /* Platform Footer References */
        .auth-footer {
            text-align: center;
            margin-top: 28px;
            color: #646870;
            font-size: 14px;
        }

        .auth-footer a {
            color: #a382ff;
            text-decoration: none;
            font-weight: 700;
            margin-left: 4px;
            transition: color 0.2s ease;
        }

        .auth-footer a:hover {
            color: #bc9fff;
            text-decoration: underline;
        }

        /* Structural Screen Adaptations */
        @media (max-width: 480px) {
            .auth-card {
                padding: 42px 24px;
                border-radius: 22px;
            }
            .auth-header h1 {
                font-size: 30px;
            }
        }
    </style>
</head>
<body>

    <!-- Particle Layer Node -->
    <canvas id="particleCanvas"></canvas>

    <!-- Visual Light Enhancers -->
    <div class="glow-sphere-1"></div>
    <div class="glow-sphere-2"></div>

    <div class="auth-wrapper">
        <div class="auth-card">
            
            <div class="auth-header">
                <h1>🚀 DavaOFC</h1>
                <p>Secured Gateway Environment</p>
            </div>

            <!-- SSR JINJA2 JUMP-GATE CONDITIONALS -->
            {% if error %}
            <div class="error-banner-frame">
                <i class="fas fa-shield-alert" style="font-size: 15px; flex-shrink: 0;"></i>
                <span>{{ error }}</span>
            </div>
            {% endif %}

            <!-- Core Login Controller -->
            <form method="POST" id="portalLoginForm">
                
                <!-- Input Identifier Node -->
                <div class="form-group">
                    <label for="identifierField">Account Username / Email</label>
                    <div class="input-box-wrapper">
                        <input type="text" id="identifierField" name="email" placeholder="Enter registration identifier" autocomplete="username" required>
                        <i class="fas fa-user-shield field-icon"></i>
                    </div>
                </div>

                <!-- Input Password Node -->
                <div class="form-group">
                    <label for="passwordField">Security Key Phrase</label>
                    <div class="input-box-wrapper">
                        <input type="password" id="passwordField" name="password" placeholder="Enter valid password matrix" autocomplete="current-password" required>
                        <i class="fas fa-lock field-icon"></i>
                        <i class="fas fa-eye password-toggle-trigger" id="passViewToggle"></i>
                    </div>
                </div>

                <!-- Submission Component -->
                <button type="submit" class="btn-core-submit" id="gateResolveBtn">
                    <span>Access Account</span><i class="fas fa-arrow-right"></i>
                </button>

            </form>

            <div class="auth-footer">
                Unregistered Node? <a href="/register">Join Network</a>
            </div>

        </div>
    </div>

    <!-- Interface Animation & Interaction Processing Engines -->
    <script>
        // 1. Password Visibility Engine
        const passField = document.getElementById('passwordField');
        const passToggle = document.getElementById('passViewToggle');

        passToggle.addEventListener('click', function() {
            const currentType = passField.getAttribute('type');
            if (currentType === 'password') {
                passField.setAttribute('type', 'text');
                passToggle.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                passField.setAttribute('type', 'password');
                passToggle.classList.replace('fa-eye-slash', 'fa-eye');
            }
        });

        // 2. Prevent Multi-submits Interaction
        document.getElementById('portalLoginForm').addEventListener('submit', function() {
            const actionButton = document.getElementById('gateResolveBtn');
            actionButton.disabled = true;
            actionButton.innerHTML = '<span>Synchronizing Hub...</span><i class="fas fa-circle-notch fa-spin"></i>';
        });

        // 3. Ultra HD Light-weight Native Particle Engine
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function initCanvasSize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        initCanvasSize();
        window.addEventListener('resize', initCanvasSize);

        class CosmicParticle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.5 + 0.5;
                this.speedX = (Math.random() - 0.5) * 0.3;
                this.speedY = (Math.random() - 0.5) * 0.3;
                this.alpha = Math.random() * 0.5 + 0.2;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
                if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = '#7c4dff';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        for (let i = 0; i < 45; i++) {
            particles.push(new CosmicParticle());
        }

        function runParticleEngine() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(runParticleEngine);
        }
        runParticleEngine();
    </script>
</body>
</html>
