<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifikasi - DavaOFC</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0A0A1A;
            background: radial-gradient(ellipse at 20% 50%, rgba(108,60,225,0.15) 0%, transparent 60%),
                        radial-gradient(ellipse at 80% 50%, rgba(255,107,107,0.08) 0%, transparent 60%),
                        #0A0A1A;
        }
        .auth-container { width: 100%; max-width: 440px; padding: 20px; }
        .auth-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: 48px 40px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            text-align: center;
        }
        .auth-logo h1 {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #8B6BE8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .otp-icon { font-size: 64px; color: #6C3CE1; margin: 16px 0; }
        .otp-subtitle { color: rgba(255,255,255,0.6); font-size: 14px; margin-bottom: 24px; line-height: 1.6; }
        .otp-subtitle strong { color: #fff; word-break: break-all; }
        .form-group { margin-bottom: 16px; }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            color: #fff;
            font-size: 20px;
            text-align: center;
            letter-spacing: 8px;
            font-weight: 600;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
        }
        .form-group input:focus {
            outline: none;
            border-color: #6C3CE1;
            box-shadow: 0 0 0 4px rgba(108,60,225,0.1);
        }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #6C3CE1, #5A2DBF);
            color: #fff;
            box-shadow: 0 4px 20px rgba(108,60,225,0.3);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 40px rgba(108,60,225,0.4); }
        .btn-outline {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.7);
            margin-top: 12px;
        }
        .btn-outline:hover { background: rgba(255,255,255,0.05); }
        .alert {
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 13px;
            margin-bottom: 16px;
            text-align: center;
        }
        .alert-error {
            background: rgba(255,23,68,0.15);
            border: 1px solid rgba(255,23,68,0.2);
            color: #FF1744;
        }
        .alert-success {
            background: rgba(0,200,83,0.15);
            border: 1px solid rgba(0,200,83,0.2);
            color: #00C853;
        }
        .auth-footer { margin-top: 20px; color: rgba(255,255,255,0.3); font-size: 13px; }
        .auth-footer a { color: #8B6BE8; text-decoration: none; cursor: pointer; }
        @media (max-width: 480px) {
            .auth-card { padding: 32px 24px; }
            .otp-icon { font-size: 48px; }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <h1>🚀 DavaOFC</h1>
            </div>

            <div class="otp-icon"><i class="fas fa-envelope"></i></div>

            <h2 style="margin-bottom: 8px;">Verifikasi Email</h2>
            
            <div class="otp-subtitle">
                Kami telah mengirim kode verifikasi ke<br>
                <strong>{{ email }}</strong>
            </div>

            {% if success %}
            <div class="alert alert-success">
                <i class="fas fa-check-circle"></i> Akun berhasil terverifikasi!<br>
                <a href="{{ url_for('login') }}" style="color: #00C853; font-weight: 600;">Klik di sini untuk Login</a>
            </div>
            {% else %}

            {% if error %}
            <div class="alert alert-error">{{ error }}</div>
            {% endif %}

            <form method="POST">
                <div class="form-group">
                    <input type="text" name="otp" placeholder="000000" maxlength="6" required>
                </div>
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-check"></i> Verifikasi
                </button>
            </form>

            <button class="btn btn-outline" onclick="resendOTP()">
                <i class="fas fa-redo"></i> Kirim Ulang Kode
            </button>
            <div id="resendMessage" style="margin-top: 8px; font-size: 13px; color: rgba(255,255,255,0.4);"></div>

            <div class="auth-footer">
                <a href="{{ url_for('login') }}">← Kembali ke Login</a>
            </div>

            <script>
                async function resendOTP() {
                    const btn = document.querySelector('.btn-outline');
                    btn.disabled = true;
                    btn.innerHTML = '<span class="fa fa-spinner fa-spin"></span> Mengirim...';
                    try {
                        const res = await fetch('/resend_otp?email={{ email }}');
                        const data = await res.json();
                        document.getElementById('resendMessage').textContent = data.message || data.error;
                        document.getElementById('resendMessage').style.color = data.success ? '#00C853' : '#FF1744';
                    } catch (e) {
                        document.getElementById('resendMessage').textContent = 'Gagal mengirim ulang!';
                        document.getElementById('resendMessage').style.color = '#FF1744';
                    }
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-redo"></i> Kirim Ulang Kode';
                }
            </script>
            {% endif %}
        </div>
    </div>
</body>
</html>
